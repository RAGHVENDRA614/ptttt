<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Change Quiz - EcoLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --secondary: #0288d1;
            --accent: #ef6c00;
            --light: #f8fafc;
            --dark: #1e293b;
            --gray: #64748b;
            --light-gray: #e2e8f0;
            --success: #4caf50;
            --warning: #ff9800;
            --info: #2196f3;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background-color: #f8fafc;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .quiz-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .quiz-header p {
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .points-display {
            background: rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .quiz-content {
            padding: 25px;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 10px;
            background: var(--light-gray);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .question-count {
            text-align: right;
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 5px;
        }

        .question-container {
            margin-bottom: 25px;
        }

        .question {
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            background: #f1f8e9;
            border-color: var(--primary);
        }

        .option.selected {
            background: #e8f5e9;
            border-color: var(--primary);
        }

        .option.correct {
            background: #e8f5e9;
            border-color: var(--success);
        }

        .option.incorrect {
            background: #ffebee;
            border-color: #f44336;
        }

        .quiz-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background-color: var(--light-gray);
            color: var(--gray);
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: var(--light-gray);
            color: var(--dark);
        }

        .btn-secondary:hover {
            background-color: #d5dbe7;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 8px;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .modal h2 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        .modal p {
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 3rem;
            color: var(--primary);
            font-weight: 700;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .quiz-controls {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quiz-header">
            <h1>Climate Change Quiz</h1>
            <p>How much do you know about climate change?</p>
            <div class="points-display">Earn up to 75 points</div>
        </div>
        
        <div class="quiz-content">
            <div class="progress-container">
                <div class="question-count">Question <span id="current-question">1</span> of <span id="total-questions">5</span></div>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>
            
            <div class="question-container">
                <div class="question" id="question"></div>
                <div class="options-container" id="options-container"></div>
                <div class="explanation" id="explanation"></div>
            </div>
            
            <div class="quiz-controls">
                <button class="btn btn-secondary" id="prev-btn" disabled>Previous</button>
                <button class="btn btn-primary" id="next-btn">Next Question</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="results-modal">
        <div class="modal-content">
            <h2>Quiz Complete!</h2>
            <p>Your final score:</p>
            <div class="score-display"><span id="final-score">0</span>/5</div>
            <p>You've earned <span id="points-earned">0</span> Eco Points</p>
            <button class="btn btn-primary" id="close-modal">Continue</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const questions = [
                {
                    question: "What is the primary greenhouse gas responsible for recent climate change?",
                    options: ["Carbon Dioxide (CO2)", "Methane (CH4)", "Nitrous Oxide (N2O)", "Water Vapor (H2O)"],
                    correctIndex: 0,
                    explanation: "Carbon dioxide (CO2) is the primary greenhouse gas emitted through human activities, responsible for about 76% of the greenhouse effect causing recent climate change."
                },
                {
                    question: "Which of these is a major consequence of climate change?",
                    options: ["Decreased sea levels", "More predictable weather patterns", "Increased frequency of extreme weather events", "Global cooling"],
                    correctIndex: 2,
                    explanation: "Climate change is increasing the frequency and intensity of extreme weather events like hurricanes, heatwaves, droughts, and heavy rainfall."
                },
                {
                    question: "What percentage of climate scientists agree that humans are causing global warming?",
                    options: ["50%", "66%", "87%", "Over 97%"],
                    correctIndex: 3,
                    explanation: "Multiple studies have found that 97% or more of actively publishing climate scientists agree that humans are causing global warming and climate change."
                },
                {
                    question: "Which of these is NOT a renewable energy source?",
                    options: ["Solar power", "Wind power", "Natural gas", "Hydroelectric power"],
                    correctIndex: 2,
                    explanation: "Natural gas is a fossil fuel, not a renewable energy source. Solar, wind, and hydroelectric power are all renewable energy sources."
                },
                {
                    question: "What is the main international agreement to limit global warming?",
                    options: ["Kyoto Protocol", "Paris Agreement", "Montreal Protocol", "Copenhagen Accord"],
                    correctIndex: 1,
                    explanation: "The Paris Agreement is a legally binding international treaty on climate change, adopted in 2015 with the goal to limit global warming to well below 2°C."
                }
            ];
            
            const questionElement = document.getElementById('question');
            const optionsContainer = document.getElementById('options-container');
            const explanationElement = document.getElementById('explanation');
            const currentQuestionElement = document.getElementById('current-question');
            const totalQuestionsElement = document.getElementById('total-questions');
            const progressElement = document.getElementById('progress');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const resultsModal = document.getElementById('results-modal');
            const finalScoreElement = document.getElementById('final-score');
            const pointsEarnedElement = document.getElementById('points-earned');
            const closeModal = document.getElementById('close-modal');
            
            let currentQuestion = 0;
            let score = 0;
            let userAnswers = new Array(questions.length).fill(null);
            
            // Initialize quiz
            totalQuestionsElement.textContent = questions.length;
            loadQuestion();
            
            // Load question
            function loadQuestion() {
                const question = questions[currentQuestion];
                questionElement.textContent = question.question;
                optionsContainer.innerHTML = '';
                
                currentQuestionElement.textContent = currentQuestion + 1;
                progressElement.style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
                
                question.options.forEach((option, index) => {
                    const optionElement = document.createElement('div');
                    optionElement.classList.add('option');
                    optionElement.textContent = option;
                    
                    if (userAnswers[currentQuestion] === index) {
                        optionElement.classList.add('selected');
                    }
                    
                    optionElement.addEventListener('click', () => selectOption(index));
                    optionsContainer.appendChild(optionElement);
                });
                
                // Show explanation if already answered
                if (userAnswers[currentQuestion] !== null) {
                    showExplanation();
                } else {
                    explanationElement.classList.remove('show');
                }
                
                // Update buttons
                prevBtn.disabled = currentQuestion === 0;
                
                if (currentQuestion === questions.length - 1) {
                    nextBtn.textContent = 'Finish Quiz';
                } else {
                    nextBtn.textContent = 'Next Question';
                }
                
                nextBtn.disabled = userAnswers[currentQuestion] === null;
            }
            
            // Select option
            function selectOption(index) {
                if (userAnswers[currentQuestion] !== null) return;
                
                userAnswers[currentQuestion] = index;
                const options = document.querySelectorAll('.option');
                
                options.forEach(option => option.classList.remove('selected'));
                options[index].classList.add('selected');
                
                // Check if correct
                const correct = index === questions[currentQuestion].correctIndex;
                if (correct) {
                    options[index].classList.add('correct');
                    score++;
                } else {
                    options[index].classList.add('incorrect');
                    options[questions[currentQuestion].correctIndex].classList.add('correct');
                }
                
                showExplanation();
                nextBtn.disabled = false;
            }
            
            // Show explanation
            function showExplanation() {
                explanationElement.textContent = questions[currentQuestion].explanation;
                explanationElement.classList.add('show');
            }
            
            // Next question
            nextBtn.addEventListener('click', function() {
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    loadQuestion();
                } else {
                    // Show results
                    finalScoreElement.textContent = score;
                    const points = Math.floor(score * 75 / questions.length);
                    pointsEarnedElement.textContent = points;
                    resultsModal.style.display = 'flex';
                }
            });
            
            // Previous question
            prevBtn.addEventListener('click', function() {
                if (currentQuestion > 0) {
                    currentQuestion--;
                    loadQuestion();
                }
            });
            
            // Close modal
            closeModal.addEventListener('click', function() {
                resultsModal.style.display = 'none';
            });
        });
    </script>
</body>
</html>
